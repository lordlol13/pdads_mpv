name: CI / Build & Publish

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/pdads_mpv
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test_build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Build frontend
        working-directory: app/frontend
        run: |
          npm ci
          npm run build

      - name: Run tests
        env:
          PYTHONPATH: .
          # FIX START - Test environment variables
          DATABASE_URL: "sqlite"
          REDIS_URL: "redis://localhost:6379/0"
          JWT_SECRET_KEY: "test-secret-key-123456789012345678901234"
          # FIX END
        run: |
          pytest -q

  build_and_push:
    name: Build Docker Image and Push
    needs: test_build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Image pushed info
        run: echo "Pushed ${{ env.IMAGE_NAME }}:${{ github.sha }}"
