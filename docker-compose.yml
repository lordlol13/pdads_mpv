version: '3.8'

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_news_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

  web:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    command: uvicorn app.backend.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips='*'

  worker:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
      - redis
    command: python -m celery -A app.backend.core.celery_app:celery_app worker --loglevel=info --pool=solo

  beat:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
      - redis
    command: python -m celery -A app.backend.core.celery_app:celery_app beat --loglevel=info

volumes:
  pgdata:
    driver: local
